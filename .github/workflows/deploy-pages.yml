# Build hezh with jemdoc and deploy to GitHub Pages.
#
# Required once per repo: Settings → Pages → Build and deployment → Source: GitHub Actions
# https://github.com/<owner>/<repo>/settings/pages
# If Source is "Deploy from a branch", deploy-pages returns 404.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build site
        run: |
          cd hezh
          ../jemdoc -c mysite.conf -o index.html homepage.jemdoc
          ../jemdoc -c mysite.conf research.jemdoc
          mkdir -p ../docs
          cp index.html research.html jemdoc.css Picture1.png ../docs/
          touch ../docs/.nojekyll
      # v4 omits dotfiles (e.g. .nojekyll); keep v3 so Jekyll is disabled on Pages.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
